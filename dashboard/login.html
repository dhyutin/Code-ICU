<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>code_icu — sign in</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #121823;
      --border: #1f2937;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --red: #f85149;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at 50% -10%, #16202e 0%, var(--bg) 55%);
      color: var(--text);
      font-family: var(--sans);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 1.75rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    h1 { margin: 0 0 0.3rem; font-size: 1.5rem; letter-spacing: -0.02em; }
    h1 .pulse { color: var(--red); }
    .tagline { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.75rem; line-height: 1.4; }
    button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #fff;
      color: #1f2328;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font: inherit;
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.55; cursor: default; }
    .g-icon { width: 18px; height: 18px; }
    .status { margin-top: 1.1rem; font-size: 0.8rem; min-height: 1.1rem; color: var(--muted); }
    .status.error { color: var(--red); }
    .foot { margin-top: 1.5rem; font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h1>code_icu <span class="pulse">&#9829;</span></h1>
    <p class="tagline">live training monitor.<br />sign in to view your runs.</p>
    <button id="google-btn">
      <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
      </svg>
      Continue with Google
    </button>
    <div class="status" id="status"></div>
    <div class="foot">Powered by InsForge Auth</div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@insforge/sdk";

    const insforge = createClient({
      baseUrl: "https://f343zu6i.us-east.insforge.app",
      anonKey: "anon_2b346540e21040864c2c54f2c1bb8f6a48f4c9b4d92fc5a8a3f2ef0b3f3255b7",
    });

    const btn = document.getElementById("google-btn");
    const statusEl = document.getElementById("status");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " error" : "");
    }

    // If already signed in, skip the login page.
    (async () => {
      const { data } = await insforge.auth.getCurrentUser();
      if (data?.user) window.location.replace("/");
    })();

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      setStatus("Redirecting to Google…");
      const { error } = await insforge.auth.signInWithOAuth("google", {
        redirectTo: window.location.origin,
        additionalParams: { prompt: "select_account" },
      });
      if (error) {
        btn.disabled = false;
        setStatus(error.message || "Sign-in failed. Try again.", true);
      }
    });
  </script>
</body>
</html>
